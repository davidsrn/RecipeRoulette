<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F97316" />
  <title>{% block title %}RecipeRoulette{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   '#F97316',
            'primary-dark': '#EA580C',
            accent:    '#FBBF24',
            warm:      '#FFFBF5',
            'warm-100':'#FEF3E2',
            'warm-200':'#FDE8C8',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="bg-warm min-h-screen font-sans text-stone-900 antialiased">

  <!-- Top nav bar -->
  <header class="sticky top-0 z-40 bg-white/80 backdrop-blur border-b border-stone-200 shadow-sm">
    <div class="max-w-lg mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-bold text-primary text-lg tracking-tight">
        <span class="text-2xl">🍽️</span>
        <span>RecipeRoulette</span>
      </a>
      <nav class="flex items-center gap-3 text-sm font-medium text-stone-600">
        <a href="/manage" class="hover:text-primary transition-colors">Manage</a>
        <form action="/logout" method="post">
          <button type="submit" class="hover:text-primary transition-colors">Logout</button>
        </form>
      </nav>
    </div>
  </header>

  <!-- Page content -->
  <main class="max-w-lg mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
