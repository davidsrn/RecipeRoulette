<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F97316" />
  <title>RecipeRoulette — Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#F97316',
            'primary-dark': '#EA580C',
            warm: '#FFFBF5',
            'warm-100': '#FEF3E2',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="bg-warm min-h-screen font-sans flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-3">🍽️</div>
      <h1 class="text-3xl font-extrabold text-stone-900">RecipeRoulette</h1>
      <p class="text-stone-500 mt-1 text-sm">Your private food reels collection</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-6 border border-stone-100">
      <h2 class="text-lg font-semibold text-stone-700 mb-4">Welcome back 👋</h2>

      {% if error %}
      <div class="mb-4 px-3 py-2 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">
        {{ error }}
      </div>
      {% endif %}

      <form action="/login" method="post" class="space-y-4">
        <div>
          <label for="password" class="block text-sm font-medium text-stone-600 mb-1">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            autofocus
            placeholder="Enter password"
            class="w-full px-4 py-3 rounded-xl border border-stone-200 bg-warm text-stone-900
                   focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                   text-base transition"
          />
        </div>

        <button
          type="submit"
          class="w-full py-3 rounded-xl bg-primary hover:bg-primary-dark text-white font-semibold
                 text-base transition-colors shadow-md active:scale-95"
        >
          Let's Cook 🍳
        </button>
      </form>
    </div>

  </div>
</body>
</html>
